
services:
  paddleocr-vl:
    image: ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlepaddle/paddleocr-vl:latest-nvidia-gpu
    container_name: paddleocr-vl
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./data:/mnt/data       # input files
      - ./output:/mnt/output   # results
      - ./paddlex_cache:/home/paddleocr/.paddlex
      # Application source
      - ./web_client.py:/workspace/web_client.py
      - ./config.py:/workspace/config.py
      - ./persistence.py:/workspace/persistence.py
      - ./runners.py:/workspace/runners.py
      - ./pipeline_cache.py:/workspace/pipeline_cache.py
      - ./editor.py:/workspace/editor.py
      - ./doc_parser_worker.py:/workspace/doc_parser_worker.py
      - ./static:/workspace/static
    shm_size: "32g"
    ports:
      - "7860:7860"

    command: >
      bash -c "pip install gradio==6.20.0 pymupdf &&
                 python /workspace/web_client.py"

